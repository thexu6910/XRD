<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XRD AI 生成</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🔬 XRD 图谱生成</h2>
        <div class="templates">
            <button id="zno">ZnO 纳米颗粒</button>
            <button id="tio2">TiO₂ 光催化剂</button>
            <button id="ceo2">CeO₂ 掺杂材料</button>
        </div>

        <div class="form-item">
            <label>样品名称</label>
            <input id="sample_name">
        </div>
        <div class="form-item">
            <label>制备方法</label>
            <input id="method">
        </div>

        <div id="params"></div>

        <button class="add-btn" onclick="addRow()">➕ 添加参数</button>
        <button class="gen-btn" id="genBtn">🚀 生成对比图谱</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
