<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XRD 结果</title>
    <style>
        body{background:#f5f7fa;padding:30px;font-family:'Microsoft YaHei',sans-serif}
        .card{max-width:1000px;margin:auto;background:white;padding:30px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
        .img-container{margin:20px 0}
        .img-label{font-size:16px;font-weight:bold;margin-bottom:10px;padding:8px 16px;border-radius:8px;display:inline-block}
        .label-standard{background:#e3f2fd;color:#1976d2}
        .label-ai{background:#ffebee;color:#c62828}
        img{width:100%;border-radius:12px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .params{background:#f8f9fa;padding:20px;border-radius:12px;margin:20px 0}
        .params h4{margin-top:0;color:#333}
        .params p{margin:8px 0;color:#555}
        .back{padding:12px 24px;background:#007bff;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin-top:20px}
        .back:hover{background:#0056b3}
    </style>
</head>
<body>
    <div class="card">
        <h2>✅ 标准图谱 VS AI生成图谱</h2>

        <div class="img-container">
            <div class="img-label label-standard">📊 标准图谱</div>
            <img id="standardImg" alt="标准XRD图谱">
        </div>

        <div class="img-container">
            <div class="img-label label-ai">🤖 AI生成图谱</div>
            <img id="aiImg" alt="AI生成XRD图谱">
        </div>

        <div class="params">
            <h4>📋 生成参数</h4>
            <div id="paramsInfo"></div>
        </div>

        <button class="back" onclick="location.href='http://127.0.0.1:5186/'">返回重新生成</button>
    </div>

    <script>
    fetch("http://127.0.0.1:5186/api/get-result")
    .then(res => res.json())
    .then(data => {
        if (data.image_standard) {
            document.getElementById("standardImg").src = "http://127.0.0.1:5186" + data.image_standard;
        }
        if (data.image_ai) {
            document.getElementById("aiImg").src = "http://127.0.0.1:5186" + data.image_ai;
        }
        const info = document.getElementById("paramsInfo");
        for (let key in data.params) {
            info.innerHTML += `<p><strong>${key}：</strong>${data.params[key]}</p>`;
        }
    })
    .catch(err => {
        alert("结果加载失败");
        console.log(err);
    });
    </script>
</body>
</html>
